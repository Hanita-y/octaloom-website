document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>OctaLoom \u2014 404</title>\n<style>\n@font-face { font-family: 'Aeonik'; src: url(\"e70c480e-eff0-4a3b-aa3d-75db85ae3848\") format('truetype'); font-weight: 400; }\n@font-face { font-family: 'Aeonik'; src: url(\"f6db6966-1ecd-4868-be64-108175f26b5a\") format('truetype'); font-weight: 700; }\n@font-face { font-family: 'Discovery'; src: url(\"8c6d0923-8d26-4c2e-b554-fc4cb0cb775e\") format('truetype'); font-weight: 300; }\n@font-face { font-family: 'Discovery'; src: url(\"a2181ff2-359b-41ce-b717-3d20409e3220\") format('truetype'); font-weight: 500; }\n\n:root {\n  --purple: #712eac;\n  --deep-purple: #201e4b;\n  --navy: #060d3d;\n  --lime: #c5e6a2;\n  --cream: #ece9e7;\n  --white: #f5f3f1;\n  --font-display: 'Discovery', sans-serif;\n  --font-body: 'Aeonik', sans-serif;\n}\n\n*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\nhtml, body { height: 100%; overflow: hidden; }\nbody {\n  font-family: var(--font-body);\n  background: var(--cream);\n  color: var(--deep-purple);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  position: relative;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ===== Floating threads background ===== */\n.threads-canvas {\n  position: fixed;\n  inset: 0;\n  pointer-events: none;\n  z-index: 0;\n}\n\n/* ===== Glows ===== */\n.glow {\n  position: fixed;\n  border-radius: 50%;\n  filter: blur(120px);\n  pointer-events: none;\n  z-index: 0;\n}\n.glow--1 { width: 500px; height: 500px; background: var(--purple); top: -15%; right: 5%; opacity: 0.09; }\n.glow--2 { width: 400px; height: 400px; background: var(--lime); bottom: -10%; left: -5%; opacity: 0.12; }\n.glow--3 { width: 300px; height: 300px; background: var(--purple); bottom: 20%; right: 25%; opacity: 0.05; }\n\n/* ===== Language Toggle ===== */\n.lang-toggle {\n  position: fixed;\n  top: 24px;\n  right: 24px;\n  z-index: 20;\n  display: flex;\n  gap: 2px;\n  background: rgba(113,46,172,0.06);\n  border-radius: 8px;\n  padding: 3px;\n}\n[dir=\"rtl\"] .lang-toggle { right: auto; left: 24px; }\n.lang-toggle button {\n  background: none;\n  color: #5c5878;\n  font-size: 13px;\n  font-weight: 700;\n  padding: 6px 14px;\n  border-radius: 6px;\n  cursor: pointer;\n  transition: all 0.3s;\n  font-family: var(--font-body);\n  letter-spacing: 0.05em;\n  border: none;\n}\n.lang-toggle button.active {\n  background: var(--purple);\n  color: white;\n}\n.lang-toggle button:hover:not(.active) {\n  color: var(--deep-purple);\n}\n\n/* ===== Main content ===== */\n.content {\n  position: relative;\n  z-index: 10;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  text-align: center;\n  padding: 20px;\n  max-width: 700px;\n}\n\n/* ===== 404 Number ===== */\n.four-oh-four {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  margin-bottom: 32px;\n  user-select: none;\n}\n\n.digit {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: clamp(100px, 18vw, 180px);\n  line-height: 1;\n  color: var(--deep-purple);\n  cursor: grab;\n  transition: color 0.3s, transform 0.15s;\n  position: relative;\n}\n.digit:active { cursor: grabbing; }\n.digit:hover {\n  color: var(--purple);\n}\n.digit.wiggle {\n  animation: digitWiggle 0.5s cubic-bezier(.36,.07,.19,.97);\n}\n@keyframes digitWiggle {\n  0%, 100% { transform: rotate(0deg); }\n  20% { transform: rotate(-12deg); }\n  40% { transform: rotate(10deg); }\n  60% { transform: rotate(-6deg); }\n  80% { transform: rotate(4deg); }\n}\n\n/* ===== Logo in the middle (the \"0\") ===== */\n.logo-zero {\n  width: clamp(90px, 16vw, 160px);\n  height: clamp(90px, 16vw, 160px);\n  cursor: pointer;\n  transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);\n  position: relative;\n}\n.logo-zero:hover {\n  transform: scale(1.1);\n}\n.logo-zero.spinning .logo-svg {\n  animation: logoSpin 0.8s cubic-bezier(.34,1.56,.64,1);\n}\n@keyframes logoSpin {\n  0% { transform: rotate(0deg) scale(1); }\n  50% { transform: rotate(180deg) scale(0.85); }\n  100% { transform: rotate(360deg) scale(1); }\n}\n.logo-svg {\n  width: 100%;\n  height: 100%;\n  color: var(--purple);\n  transition: color 0.3s;\n  filter: drop-shadow(0 4px 20px rgba(113,46,172,0.2));\n}\n.logo-zero:hover .logo-svg {\n  color: var(--deep-purple);\n}\n\n/* ===== Spark particles on click ===== */\n.spark {\n  position: absolute;\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  pointer-events: none;\n  z-index: 30;\n}\n@keyframes sparkBurst {\n  0% { transform: translate(0,0) scale(1); opacity: 1; }\n  100% { opacity: 0; }\n}\n\n/* ===== Copy ===== */\n.tagline {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: clamp(24px, 4vw, 38px);\n  line-height: 1.25;\n  margin-bottom: 16px;\n  color: var(--deep-purple);\n  letter-spacing: -0.01em;\n}\n[dir=\"ltr\"] .tagline {\n  font-family: var(--font-body);\n  font-weight: 700;\n}\n[dir=\"ltr\"] .subtitle {\n  font-family: var(--font-body);\n  font-weight: 400;\n}\n.subtitle {\n  font-family: var(--font-display);\n  font-weight: 300;\n  font-size: clamp(15px, 2.2vw, 18px);\n  color: #5c5878;\n  line-height: 1.65;\n  margin-bottom: 36px;\n  max-width: 460px;\n  text-wrap: pretty;\n  white-space: pre-line;\n}\n\n/* ===== CTA Button ===== */\n.cta-btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  padding: 16px 32px;\n  border-radius: 10px;\n  background: var(--purple);\n  color: white;\n  font-size: 16px;\n  font-weight: 700;\n  border: none;\n  cursor: pointer;\n  transition: all 0.3s cubic-bezier(.34,1.56,.64,1);\n  text-decoration: none;\n  font-family: var(--font-body);\n  position: relative;\n  overflow: hidden;\n}\n.cta-btn:hover {\n  transform: translateY(-2px) scale(1.03);\n  box-shadow: 0 8px 30px rgba(113,46,172,0.35);\n}\n.cta-btn:active {\n  transform: translateY(0) scale(0.98);\n}\n.cta-btn .arrow {\n  transition: transform 0.3s;\n}\n.cta-btn:hover .arrow {\n  transform: translateX(4px);\n}\n[dir=\"rtl\"] .cta-btn:hover .arrow {\n  transform: translateX(-4px) scaleX(-1);\n}\n[dir=\"rtl\"] .cta-btn .arrow {\n  transform: scaleX(-1);\n}\n\n/* ===== Easter egg counter ===== */\n.click-counter {\n  position: fixed;\n  bottom: 24px;\n  left: 50%;\n  transform: translateX(-50%);\n  font-size: 13px;\n  color: #5c5878;\n  opacity: 0;\n  transition: opacity 0.5s;\n  z-index: 20;\n  font-family: var(--font-body);\n  text-align: center;\n}\n.click-counter.visible { opacity: 1; }\n\n/* ===== Responsive ===== */\n@media (max-width: 600px) {\n  .four-oh-four { gap: 2px; }\n  .lang-toggle { top: 16px; right: 16px; }\n  [dir=\"rtl\"] .lang-toggle { right: auto; left: 16px; }\n}\n\n/* ===== Entry animation ===== */\n.content { animation: fadeUp 0.8s cubic-bezier(.16,1,.3,1) both; }\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(30px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n.lang-toggle { animation: fadeDown 0.6s 0.3s cubic-bezier(.16,1,.3,1) both; }\n@keyframes fadeDown {\n  from { opacity: 0; transform: translateY(-10px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n</style>\n\n</head>\n<body>\n<div class=\"glow glow--1\"></div>\n<div class=\"glow glow--2\"></div>\n<div class=\"glow glow--3\"></div>\n<canvas class=\"threads-canvas\" id=\"threadsCanvas\"></canvas>\n\n<div class=\"lang-toggle\" id=\"langToggle\">\n  <button id=\"btnEn\" onclick=\"setLang('en')\">EN</button>\n  <button id=\"btnHe\" onclick=\"setLang('he')\">\u05e2\u05d1</button>\n</div>\n\n<div class=\"content\" id=\"content\">\n  <div class=\"four-oh-four\">\n    <span class=\"digit\" id=\"d1\" onclick=\"wiggleDigit(this)\">4</span>\n    <div class=\"logo-zero\" id=\"logoZero\" onclick=\"spinLogo()\">\n      <svg class=\"logo-svg\" viewBox=\"0 0 301.75 301.13\" xmlns=\"http://www.w3.org/2000/svg\">\n        <g>\n          <path d=\"M198.3,194.74l-1.05-.84c-.08-.07-.16-.13-.24-.22l-13.67-13.67,15.51-15.51,12.7,12.7,10.6-10.61-12.7-12.7,15.52-15.5,13.65,13.65c.09.09.17.17.24.27l.83,1.05-41.39,41.38ZM187.58,180.01l10.6,10.61,11.27-11.27-10.6-10.61-11.27,11.27ZM213.69,153.89l10.61,10.61,11.27-11.26-10.6-10.61-11.27,11.26Z\" fill=\"currentColor\"></path>\n          <path d=\"M87.17,83.81l-13.65-13.65c-.09-.09-.16-.16-.24-.26l-.84-1.05,41.4-41.39,1.05.84c.09.07.17.15.26.24l13.65,13.65-15.5,15.51-12.7-12.7-10.61,10.6,12.7,12.7-15.51,15.51ZM76.57,68.97l10.6,10.6,11.27-11.27-10.6-10.6-11.27,11.27ZM102.69,42.85l10.61,10.61,11.26-11.27-10.6-10.6-11.27,11.26Z\" fill=\"currentColor\"></path>\n          <path d=\"M156.06,222.21h0c-9.53,0-18.47-3.7-25.19-10.43l-75.48-75.5c-6.72-6.72-10.42-15.66-10.42-25.19,0-9.53,3.7-18.47,10.43-25.19l6.45-6.45,1.05,1.3,13.67,13.67-6.32,6.32c-2.76,2.76-4.28,6.43-4.28,10.35,0,3.91,1.52,7.59,4.28,10.34l32.44,32.45-12.7,12.7,10.61,10.61,12.7-12.7,32.44,32.45c2.75,2.76,6.43,4.28,10.34,4.28h0c3.91,0,7.59-1.52,10.35-4.28l6.32-6.32,13.65,13.65,1.3,1.05-1.16,1.2-5.27,5.27c-6.71,6.72-15.66,10.42-25.19,10.42Z\" fill=\"currentColor\"></path>\n          <path d=\"M250.29,142.76l-1.05-1.31-13.67-13.67,6.32-6.33c2.76-2.76,4.28-6.43,4.28-10.34,0-3.91-1.52-7.59-4.28-10.35l-32.44-32.45,12.7-12.7-10.6-10.6-12.7,12.7-32.44-32.44c-2.76-2.76-6.43-4.28-10.35-4.28h0c-3.91,0-7.58,1.52-10.34,4.28l-6.33,6.32-13.65-13.65-1.3-1.05,1.16-1.2,5.27-5.27c6.72-6.72,15.66-10.42,25.19-10.42h0c9.53,0,18.47,3.7,25.19,10.43l75.48,75.5c6.72,6.72,10.42,15.66,10.42,25.19,0,9.53-3.7,18.47-10.42,25.19l-6.46,6.46Z\" fill=\"currentColor\"></path>\n        </g>\n      </svg>\n    </div>\n    <span class=\"digit\" id=\"d2\" onclick=\"wiggleDigit(this)\">4</span>\n  </div>\n\n  <h1 class=\"tagline\" id=\"tagline\"></h1>\n  <p class=\"subtitle\" id=\"subtitle\"></p>\n  <div style=\"margin-bottom: 24px; display: flex; justify-content: center;\"><img src=\"https://raw.githubusercontent.com/Hanita-y/Octaloom-images-and-videos/main/gif%20hanita.gif\" alt=\"\" style=\"max-width: 280px; width: 100%; border-radius: 12px;\" loading=\"lazy\" /></div>\n  <a class=\"cta-btn\" href=\"/\" id=\"ctaBtn\">\n    <span id=\"ctaText\"></span>\n    <svg class=\"arrow\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"></path><path d=\"m12 5 7 7-7 7\"></path></svg>\n  </a>\n</div>\n\n<div class=\"click-counter\" id=\"clickCounter\"></div>\n\n<script>\n// ===== Copy =====\nconst copy = {\n  en: {\n    taglines: [\n      \"This weave leads nowhere.\",\n      \"The weave came undone.\",\n      \"Lost between the weaves.\",\n      \"This page unweaved itself.\",\n      \"Weave gone wrong.\",\n    ],\n    subtitles: [\n      \"Looks like this page got tangled up somewhere.\\nDon't worry, even the best looms skip a stitch.\",\n      \"We searched every thread and came up empty.\\nLet's get you back on the right pattern.\",\n      \"This page decided to go freelance.\\nUnfortunately, it didn't leave a forwarding address.\",\n      \"Our threads are usually very well-organized.\\nThis one clearly had other plans.\",\n      \"404: Page not found. Dignity: also missing.\\nLet's pretend this never happened.\",\n    ],\n    cta: \"Back to safety\",\n    easterEgg: [\n      \"You clicked {n} times. The page is still missing.\",\n      \"That's {n} clicks. Impressive commitment.\",\n      \"{n} clicks. This page isn't coming back, you know.\",\n      \"{n}. Okay, you win. But the page still doesn't exist.\",\n      \"{n} clicks?! You should be running a company. Oh wait.\",\n    ],\n  },\n  he: {\n    taglines: [\n      \"\u05d4\u05e2\u05de\u05d5\u05d3 \u05d4\u05d6\u05d4 \u05d4\u05ea\u05e4\u05e8\u05e7\",\n      \"\u05d4\u05d0\u05e8\u05d9\u05d2\u05d4 \u05e0\u05e4\u05e8\u05de\u05d4.\",\n      \"\u05d4\u05d5\u05dc\u05db\u05d9\u05dd \u05dc\u05d0\u05d9\u05d1\u05d5\u05d3 \u05d1\u05d3\u05d5\u05d2\u05de\u05d4.\",\n      \"\u05d4\u05d7\u05d5\u05d8 \u05d4\u05d6\u05d4 \u05dc\u05d0 \u05de\u05d5\u05d1\u05d9\u05dc \u05dc\u05e9\u05d5\u05dd \u05de\u05e7\u05d5\u05dd.\",\n      \"\u05d7\u05d5\u05d8 \u05dc\u05d0 \u05e0\u05db\u05d5\u05df, \u05d7\u05d1\u05e8/\u05d4.\",\n    ],\n    subtitles: [\n      \"\u05e0\u05e8\u05d0\u05d4 \u05e9\u05e0\u05e4\u05e8\u05dd \u05dc\u05e0\u05d5 \u05e7\u05e9\u05e8 \u05d1\u05d3\u05e8\u05da.\\n\u05d1\u05d5\u05d0\u05d5 \u05e0\u05d7\u05d6\u05d5\u05e8 \u05dc\u05e0\u05e7\u05d5\u05d3\u05d4 \u05e9\u05d1\u05d4 \u05d4\u05db\u05dc \u05de\u05ea\u05d7\u05d1\u05e8 \u05d5\u05e0\u05ea\u05d7\u05d9\u05dc \u05dc\u05d0\u05e8\u05d5\u05d2 \u05de\u05d7\u05d3\u05e9.\",\n      \"\u05d7\u05d9\u05e4\u05e9\u05e0\u05d5 \u05d1\u05db\u05dc \u05d7\u05d5\u05d8 \u05d5\u05d9\u05e6\u05d0\u05e0\u05d5 \u05d1\u05d9\u05d3\u05d9\u05d9\u05dd \u05e8\u05d9\u05e7\u05d5\u05ea.\\n\u05d1\u05d5\u05d0\u05d5 \u05e0\u05d7\u05d6\u05d9\u05e8 \u05d0\u05ea\u05db\u05dd \u05dc\u05d3\u05d5\u05d2\u05de\u05d4 \u05d4\u05e0\u05db\u05d5\u05e0\u05d4.\",\n      \"\u05d4\u05e2\u05de\u05d5\u05d3 \u05d4\u05d7\u05dc\u05d9\u05d8 \u05dc\u05e6\u05d0\u05ea \u05dc\u05e4\u05e8\u05d9\u05dc\u05e0\u05e1.\\n\u05dc\u05e6\u05e2\u05e8\u05e0\u05d5, \u05d4\u05d5\u05d0 \u05dc\u05d0 \u05d4\u05e9\u05d0\u05d9\u05e8 \u05db\u05ea\u05d5\u05d1\u05ea.\",\n      \"\u05d4\u05d7\u05d5\u05d8\u05d9\u05dd \u05e9\u05dc\u05e0\u05d5 \u05d1\u05d3\u05e8\u05da \u05db\u05dc\u05dc \u05de\u05e1\u05d5\u05d3\u05e8\u05d9\u05dd.\\n\u05dc\u05d6\u05d4 \u05db\u05e0\u05e8\u05d0\u05d4 \u05d4\u05d9\u05d5 \u05ea\u05d5\u05db\u05e0\u05d9\u05d5\u05ea \u05d0\u05d7\u05e8\u05d5\u05ea.\",\n      \"404: \u05e2\u05de\u05d5\u05d3 \u05dc\u05d0 \u05e0\u05de\u05e6\u05d0. \u05db\u05d1\u05d5\u05d3: \u05d2\u05dd \u05e0\u05e2\u05dc\u05dd.\\n\u05d1\u05d5\u05d0\u05d5 \u05e0\u05e2\u05e9\u05d4 \u05db\u05d0\u05d9\u05dc\u05d5 \u05d6\u05d4 \u05dc\u05d0 \u05e7\u05e8\u05d4.\",\n    ],\n    cta: \"\u05d7\u05d6\u05e8\u05d4 \u05dc\u05de\u05e7\u05d5\u05dd \u05d1\u05d8\u05d5\u05d7\",\n    easterEgg: [\n      \"\u05dc\u05d7\u05e6\u05ea {n} \u05e4\u05e2\u05de\u05d9\u05dd. \u05d4\u05e2\u05de\u05d5\u05d3 \u05e2\u05d3\u05d9\u05d9\u05df \u05d7\u05e1\u05e8.\",\n      \"\u05d6\u05d4 {n} \u05dc\u05d7\u05d9\u05e6\u05d5\u05ea. \u05de\u05d7\u05d5\u05d9\u05d1\u05d5\u05ea \u05de\u05e8\u05e9\u05d9\u05de\u05d4.\",\n      \"{n} \u05dc\u05d7\u05d9\u05e6\u05d5\u05ea. \u05d4\u05e2\u05de\u05d5\u05d3 \u05dc\u05d0 \u05d7\u05d5\u05d6\u05e8, \u05d0\u05ea\u05d4 \u05d9\u05d5\u05d3\u05e2.\",\n      \"{n}. \u05d0\u05d5\u05e7\u05d9\u05d9, \u05e0\u05d9\u05e6\u05d7\u05ea. \u05d0\u05d1\u05dc \u05d4\u05e2\u05de\u05d5\u05d3 \u05e2\u05d3\u05d9\u05d9\u05df \u05dc\u05d0 \u05e7\u05d9\u05d9\u05dd.\",\n      \"{n} \u05dc\u05d7\u05d9\u05e6\u05d5\u05ea?! \u05d0\u05ea\u05d4 \u05e6\u05e8\u05d9\u05da \u05dc\u05e0\u05d4\u05dc \u05d7\u05d1\u05e8\u05d4. \u05e8\u05d2\u05e2...\",\n    ],\n  }\n};\n\n// ===== State =====\nlet lang = localStorage.getItem('octaloom-lang') || 'he';\nlet clickCount = 0;\nlet copyIndex = Math.floor(Math.random() * 5);\n\n// ===== Language =====\nfunction setLang(l) {\n  lang = l;\n  localStorage.setItem('octaloom-lang', l);\n  updateUI();\n}\n\nfunction updateUI() {\n  const dir = lang === 'he' ? 'rtl' : 'ltr';\n  document.getElementById('content').parentElement.setAttribute('dir', dir);\n  document.getElementById('content').parentElement.style.direction = dir;\n  document.getElementById('btnEn').className = lang === 'en' ? 'active' : '';\n  document.getElementById('btnHe').className = lang === 'he' ? 'active' : '';\n\n  const c = copy[lang];\n  document.getElementById('tagline').textContent = lang === 'he' ? c.taglines[0] : c.taglines[copyIndex];\n  document.getElementById('subtitle').textContent = lang === 'he' ? c.subtitles[0] : c.subtitles[copyIndex];\n  document.getElementById('ctaText').textContent = c.cta;\n\n  // Update easter egg if visible\n  if (clickCount >= 3) {\n    updateEasterEgg();\n  }\n}\n\n// ===== Digit wiggle =====\nfunction wiggleDigit(el) {\n  el.classList.remove('wiggle');\n  void el.offsetWidth;\n  el.classList.add('wiggle');\n  clickCount++;\n  if (clickCount >= 3) {\n    updateEasterEgg();\n  }\n}\n\n// ===== Logo spin + sparks =====\nfunction spinLogo() {\n  const logo = document.getElementById('logoZero');\n  logo.classList.remove('spinning');\n  void logo.offsetWidth;\n  logo.classList.add('spinning');\n  clickCount++;\n\n  // Emit sparks\n  emitSparks(logo);\n\n  // Change copy on every 5th click\n  if (clickCount % 5 === 0) {\n    copyIndex = (copyIndex + 1) % 5;\n    updateUI();\n  }\n\n  if (clickCount >= 3) {\n    updateEasterEgg();\n  }\n}\n\nfunction emitSparks(parent) {\n  const rect = parent.getBoundingClientRect();\n  const cx = rect.left + rect.width / 2;\n  const cy = rect.top + rect.height / 2;\n  const colors = ['#712eac', '#c5e6a2', '#201e4b', '#712eac', '#c5e6a2'];\n\n  for (let i = 0; i < 10; i++) {\n    const spark = document.createElement('div');\n    spark.className = 'spark';\n    spark.style.background = colors[i % colors.length];\n    spark.style.left = cx + 'px';\n    spark.style.top = cy + 'px';\n    spark.style.position = 'fixed';\n    const angle = (Math.PI * 2 * i) / 10 + (Math.random() - 0.5) * 0.5;\n    const dist = 40 + Math.random() * 60;\n    const dx = Math.cos(angle) * dist;\n    const dy = Math.sin(angle) * dist;\n    const size = 4 + Math.random() * 5;\n    spark.style.width = size + 'px';\n    spark.style.height = size + 'px';\n    spark.style.animation = `sparkBurst 0.6s cubic-bezier(.16,1,.3,1) forwards`;\n    spark.style.setProperty('--dx', dx + 'px');\n    spark.style.setProperty('--dy', dy + 'px');\n\n    // Custom keyframes via transform\n    spark.animate([\n      { transform: 'translate(0,0) scale(1)', opacity: 1 },\n      { transform: `translate(${dx}px, ${dy}px) scale(0)`, opacity: 0 }\n    ], { duration: 600, easing: 'cubic-bezier(.16,1,.3,1)', fill: 'forwards' });\n\n    document.body.appendChild(spark);\n    setTimeout(() => spark.remove(), 650);\n  }\n}\n\n// ===== Easter egg =====\nfunction updateEasterEgg() {\n  const el = document.getElementById('clickCounter');\n  const msgs = copy[lang].easterEgg;\n  const idx = Math.min(Math.floor((clickCount - 3) / 4), msgs.length - 1);\n  el.textContent = msgs[idx].replace('{n}', clickCount);\n  el.classList.add('visible');\n}\n\n// ===== Threads canvas =====\nfunction initThreads() {\n  const canvas = document.getElementById('threadsCanvas');\n  const ctx = canvas.getContext('2d');\n  let w, h;\n  const threads = [];\n  const THREAD_COUNT = 8;\n\n  function resize() {\n    w = canvas.width = window.innerWidth;\n    h = canvas.height = window.innerHeight;\n  }\n  resize();\n  window.addEventListener('resize', resize);\n\n  // Create threads\n  for (let i = 0; i < THREAD_COUNT; i++) {\n    threads.push({\n      points: generateCurve(),\n      speed: 0.2 + Math.random() * 0.4,\n      offset: Math.random() * Math.PI * 2,\n      color: i % 3 === 0 ? 'rgba(113,46,172,0.06)' : i % 3 === 1 ? 'rgba(197,230,162,0.08)' : 'rgba(32,30,75,0.04)',\n      width: 1 + Math.random() * 2,\n    });\n  }\n\n  function generateCurve() {\n    const pts = [];\n    const startX = Math.random() * 1.4 - 0.2;\n    const startY = Math.random();\n    for (let j = 0; j < 5; j++) {\n      pts.push({\n        x: startX + (j / 4) * (0.5 + Math.random() * 0.5) * (Math.random() > 0.5 ? 1 : -1),\n        y: startY + (j / 4) * (0.6 + Math.random() * 0.4),\n        vx: (Math.random() - 0.5) * 0.02,\n        vy: (Math.random() - 0.5) * 0.01,\n      });\n    }\n    return pts;\n  }\n\n  function draw(t) {\n    ctx.clearRect(0, 0, w, h);\n    threads.forEach(thread => {\n      ctx.beginPath();\n      ctx.strokeStyle = thread.color;\n      ctx.lineWidth = thread.width;\n      ctx.lineCap = 'round';\n\n      const pts = thread.points.map((p, i) => ({\n        x: (p.x + Math.sin(t * 0.001 * thread.speed + p.vx * 100 + thread.offset) * 0.03) * w,\n        y: (p.y + Math.cos(t * 0.001 * thread.speed + p.vy * 100 + thread.offset) * 0.02) * h,\n      }));\n\n      ctx.moveTo(pts[0].x, pts[0].y);\n      for (let i = 1; i < pts.length - 1; i++) {\n        const cpx = (pts[i].x + pts[i + 1].x) / 2;\n        const cpy = (pts[i].y + pts[i + 1].y) / 2;\n        ctx.quadraticCurveTo(pts[i].x, pts[i].y, cpx, cpy);\n      }\n      ctx.stroke();\n    });\n    requestAnimationFrame(draw);\n  }\n  requestAnimationFrame(draw);\n}\n\n// ===== Init =====\nupdateUI();\ninitThreads();\n</script>\n\n\n</body></html>"</script>
